services:
  mcp-server:
    build: .
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:9020:8000"   # listen on localhost only, exposed via nginx reverse proxy
    volumes:
      - /home/ubuntu/repo:/workspace:rw   # mount host repo directory
    environment:
      - WORKSPACE_DIR=/workspace
      - COMMAND_TIMEOUT=120
    # If the container needs to run docker commands, mount the docker socket:
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
