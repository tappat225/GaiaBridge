services:
  worker:
    build:
      context: ..
      dockerfile: worker/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: workbridge-worker
    image: workbridge-worker
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${WORKBRIDGE_WORKSPACE_DIR:-/home/ubuntu/repo}:/workspace:rw
      - ./config.toml:/etc/workbridge/worker.toml:ro
    environment:
      - WORKBRIDGE_CONFIG=/etc/workbridge/worker.toml
