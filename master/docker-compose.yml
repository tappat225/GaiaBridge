services:
  master:
    build:
      context: ..
      dockerfile: master/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: gaia-bridge-master
    image: gaia-bridge-master
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${GAIABRIDGE_MASTER_DATA:-./data}:/app/data
      - ${GAIABRIDGE_MASTER_CONFIG:-./config.toml}:/etc/gaia_bridge/master.toml:ro
    environment:
      - GAIABRIDGE_CONFIG=/etc/gaia_bridge/master.toml
