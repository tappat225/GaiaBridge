services:
  master:
    build:
      context: ..
      dockerfile: master/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    container_name: workbridge-master
    image: workbridge-master
    restart: unless-stopped
    network_mode: host
    volumes:
      - master-data:/app/data
      - ./config.toml:/etc/workbridge/master.toml:ro
    environment:
      - WORKBRIDGE_CONFIG=/etc/workbridge/master.toml

volumes:
  master-data:
